# .github/workflows/release.yml
name: Release / Publish

on:
  push:
    branches:
      - main
  # Optional: Also run on tags (for manual releases or specific workflow)
  # tags:
  #   - 'v*'

jobs:
  ci-release:
    # Use a build matrix for multiple Scala/Java versions if needed, 
    # but keep the release job simple for single releases.
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Required for sbt-ci-release to read git history and tag
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Use your project's target JDK version
          cache: 'sbt'

      - name: Setup sbt
        uses: sbt/setup-sbt@v1 # Use the official sbt setup action

      - name: Publish Release and Tag
        env:
          # Crucial for publishing to Sonatype/Maven Central
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          
          # Use sbt-ci-release's automatic release command
          # `sbt +ci-release` runs full release across all cross-versions
        run: sbt ci-release

      - name: Create GitHub Release (Optional)
        # This step uses the tag created by ci-release to make a nice GitHub Release page
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          # Use the tag created by the sbt ci-release step
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: Release ${{ steps.release.outputs.tag_name }}
          draft: false
          prerelease: false